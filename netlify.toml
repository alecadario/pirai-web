[[redirects]]
  from = "http://pirai.es/*"
  to = "https://pirai.es/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.pirai.es/*"
  to = "https://pirai.es/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.pirai.es/*"
  to = "https://pirai.es/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
